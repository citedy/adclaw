# Publish Python package to PyPI when a release is created.
# Build includes console frontend (see scripts/wheel_build.sh).

name: Publish Python Package to PyPI

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/adclaw
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up Node (for console build)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: console/package-lock.json

      - name: Build console frontend
        run: |
          cd console && npm ci && npm run build
        # Vite outputs directly to src/adclaw/console/ (see vite.config.ts outDir)

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel build

      - name: Build package
        run: python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
